<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">
   
<div class="container">

    <div class="row vh-100 justify-content-center align-items-center">

        <div class="col-md-4">

            <div class="card shadow-lg border-0">

                <div class="card-body p-4">

                    <h2 class="text-center mb-4">
                        🔐 Admin Login
                    </h2>

                    <form method="POST">

                        <div class="mb-3">
                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                placeholder="Username"
                                required>
                        </div>

                        <div class="mb-3">
                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Password"
                                required>
                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
